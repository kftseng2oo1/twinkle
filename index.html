<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Twinkle Hub 探索器</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif;
    margin: 0; padding: 12px; background: #0a0e27; color: #e4e6f0;
    min-height: 100vh; font-size: 15px;
  }
  h1 { font-size: 18px; margin: 0 0 4px; color: #ffd700; }
  .sub { color: #8892b0; font-size: 12px; margin-bottom: 14px; }
  
  .search-bar {
    position: sticky; top: 0; background: #0a0e27; padding: 8px 0;
    z-index: 10; margin-bottom: 8px;
  }
  .search-bar input {
    width: 100%; background: #1a1f3a; color: #e4e6f0;
    border: 1px solid #3a4070; padding: 10px 12px; border-radius: 8px;
    font-size: 16px; -webkit-appearance: none;
  }
  
  .group {
    background: #1a1f3a; border-radius: 10px; padding: 4px;
    margin-bottom: 10px; border: 1px solid #2a3050;
  }
  .group-header {
    padding: 10px 12px; font-weight: 600; color: #64ffda;
    font-size: 13px; display: flex; justify-content: space-between;
  }
  .group-header .count { color: #8892b0; font-weight: 400; }
  
  .tool {
    background: #0f1430; border-radius: 6px; padding: 10px 12px;
    margin: 4px; cursor: pointer; border: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .tool:active { border-color: #64ffda; }
  .tool-name { font-size: 13px; color: #64ffda; font-family: ui-monospace, monospace; }
  .tool-desc { font-size: 12px; color: #a8b2c8; margin-top: 4px; line-height: 1.4; }
  
  .modal-bg {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); z-index: 100; padding: 16px;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .modal-bg.show { display: block; }
  .modal {
    background: #1a1f3a; border-radius: 12px; padding: 16px;
    max-width: 600px; margin: 20px auto; border: 1px solid #3a4070;
  }
  .modal h2 {
    margin: 0 0 4px; font-size: 16px; color: #ffd700;
    font-family: ui-monospace, monospace;
  }
  .modal .desc { font-size: 13px; color: #a8b2c8; margin-bottom: 14px; line-height: 1.5; }
  .field { margin-bottom: 12px; }
  .field-label {
    font-size: 12px; color: #8892b0; margin-bottom: 4px;
    display: flex; justify-content: space-between;
  }
  .field-label .required { color: #ff6b9d; }
  .field-label .type { color: #64ffda; font-family: ui-monospace, monospace; }
  .field input, .field textarea {
    width: 100%; background: #0a0e27; color: #e4e6f0;
    border: 1px solid #3a4070; padding: 10px 12px; border-radius: 8px;
    font-size: 16px; -webkit-appearance: none; font-family: inherit;
  }
  .field textarea { min-height: 80px; resize: vertical; }
  
  button {
    background: #2a3050; color: #e4e6f0; border: 1px solid #3a4070;
    padding: 12px 14px; border-radius: 8px; font-size: 14px;
    width: 100%; margin-top: 8px; cursor: pointer;
    -webkit-appearance: none; font-weight: 500;
  }
  button:active { background: #3a4070; }
  button.primary { background: #ffd700; color: #0a0e27; font-weight: 600; border: none; }
  button.secondary { background: transparent; border-color: #3a4070; }
  
  .result {
    margin-top: 12px; padding: 12px; border-radius: 8px;
    background: #050816; max-height: 50vh; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .result.success { border-left: 3px solid #64ffda; }
  .result.error { border-left: 3px solid #ff6b9d; }
  .result-text {
    color: #e4e6f0; white-space: pre-wrap; word-break: break-word;
    font-size: 14px; line-height: 1.5;
  }
  .result-text.mono { font-family: ui-monospace, monospace; font-size: 12px; color: #64ffda; }
  .result-toggle {
    font-size: 12px; color: #8892b0; cursor: pointer; margin-top: 8px;
    text-decoration: underline;
  }
  
  .loading { color: #ffd700; padding: 20px; text-align: center; }
  .empty { color: #8892b0; padding: 20px; text-align: center; font-size: 13px; }
</style>
</head>
<body>

<h1>🌟 Twinkle Hub 探索器</h1>
<div class="sub">點工具 → 填參數 → 看結果</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 搜尋工具(例如:民國、身分證、樂透)">
</div>

<div id="toolsContainer">
  <div class="loading">載入工具清單中...</div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalName"></h2>
    <div class="desc" id="modalDesc"></div>
    <div id="modalFields"></div>
    <button class="primary" id="btnCall">🚀 呼叫</button>
    <button class="secondary" id="btnClose">關閉</button>
    <div id="modalResult"></div>
  </div>
</div>

<script>
var WORKER = 'https://twinklehub.kftseng2oo1.workers.dev';
var allTools = [];
var currentTool = null;

// 載入工具清單
function loadTools() {
  fetch(WORKER + '/tools')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.result && data.result.tools) {
        allTools = data.result.tools;
        renderTools('');
      } else {
        document.getElementById('toolsContainer').innerHTML =
          '<div class="empty">無法取得工具清單<br><pre>' +
          JSON.stringify(data, null, 2) + '</pre></div>';
      }
    })
    .catch(function(err) {
      document.getElementById('toolsContainer').innerHTML =
        '<div class="empty">錯誤:' + err.message + '</div>';
    });
}

// 把工具分群(用 prefix 前綴)
function groupTools(tools) {
  var groups = {};
  tools.forEach(function(t) {
    var prefix = t.name.split(/[-_]/)[0];
    if (!groups[prefix]) groups[prefix] = [];
    groups[prefix].push(t);
  });
  return groups;
}

function renderTools(filter) {
  var keyword = filter.toLowerCase().trim();
  var filtered = allTools;
  if (keyword) {
    filtered = allTools.filter(function(t) {
      return t.name.toLowerCase().indexOf(keyword) !== -1 ||
             (t.description || '').toLowerCase().indexOf(keyword) !== -1;
    });
  }
  
  if (filtered.length === 0) {
    document.getElementById('toolsContainer').innerHTML =
      '<div class="empty">找不到符合的工具</div>';
    return;
  }
  
  var groups = groupTools(filtered);
  var html = '';
  Object.keys(groups).sort().forEach(function(g) {
    html += '<div class="group">';
    html += '<div class="group-header">' + g +
            ' <span class="count">' + groups[g].length + ' 個工具</span></div>';
    groups[g].forEach(function(t) {
      var desc = (t.description || '').replace(/\*\*/g, '').slice(0, 80);
      html += '<div class="tool" data-name="' + t.name + '">';
      html += '<div class="tool-name">' + t.name + '</div>';
      html += '<div class="tool-desc">' + desc + '</div>';
      html += '</div>';
    });
    html += '</div>';
  });
  document.getElementById('toolsContainer').innerHTML = html;
  
  // 綁定點擊事件
  var els = document.querySelectorAll('.tool');
  for (var i = 0; i < els.length; i++) {
    els[i].addEventListener('click', function() {
      openTool(this.getAttribute('data-name'));
    });
  }
}

// 開啟工具細節 modal,自動依 schema 生成欄位
function openTool(name) {
  var tool = allTools.filter(function(t) { return t.name === name; })[0];
  if (!tool) return;
  currentTool = tool;
  
  document.getElementById('modalName').textContent = tool.name;
  document.getElementById('modalDesc').textContent = (tool.description || '').replace(/\*\*/g, '');
  document.getElementById('modalResult').innerHTML = '';
  
  var schema = tool.inputSchema || {};
  var props = schema.properties || {};
  var required = schema.required || [];
  
  var fieldsHtml = '';
  Object.keys(props).forEach(function(key) {
    var p = props[key];
    var isReq = required.indexOf(key) !== -1;
    var typeStr = p.type || 'string';
    if (p.enum) typeStr = 'enum: ' + p.enum.join(' | ');
    
    fieldsHtml += '<div class="field">';
    fieldsHtml += '<div class="field-label">';
    fieldsHtml += '<span>' + key + (isReq ? ' <span class="required">*</span>' : '') +
                  (p.description ? ' — ' + p.description.slice(0, 50) : '') + '</span>';
    fieldsHtml += '<span class="type">' + typeStr + '</span>';
    fieldsHtml += '</div>';
    
    var inputType = 'text';
    if (p.type === 'number' || p.type === 'integer') inputType = 'number';
    
    var defaultVal = p.default !== undefined ? p.default : '';
    if (p.type === 'object' || p.type === 'array') {
      fieldsHtml += '<textarea data-field="' + key + '" data-type="' + p.type + '" placeholder="JSON 格式">' +
                    (defaultVal ? JSON.stringify(defaultVal) : '') + '</textarea>';
    } else {
      fieldsHtml += '<input type="' + inputType + '" data-field="' + key +
                    '" data-type="' + p.type + '" value="' + defaultVal + '">';
    }
    fieldsHtml += '</div>';
  });
  
  if (Object.keys(props).length === 0) {
    fieldsHtml = '<div class="empty">這個工具不需要參數</div>';
  }
  
  document.getElementById('modalFields').innerHTML = fieldsHtml;
  document.getElementById('modalBg').classList.add('show');
  window.scrollTo(0, 0);
}

function closeTool() {
  document.getElementById('modalBg').classList.remove('show');
  currentTool = null;
}

function callTool() {
  if (!currentTool) return;
  
  // 收集所有欄位值
  var args = {};
  var inputs = document.querySelectorAll('#modalFields [data-field]');
  for (var i = 0; i < inputs.length; i++) {
    var key = inputs[i].getAttribute('data-field');
    var type = inputs[i].getAttribute('data-type');
    var val = inputs[i].value.trim();
    if (val === '') continue;
    
    if (type === 'number' || type === 'integer') {
      args[key] = parseFloat(val);
    } else if (type === 'object' || type === 'array') {
      try { args[key] = JSON.parse(val); }
      catch (e) { args[key] = val; }
    } else if (type === 'boolean') {
      args[key] = val === 'true';
    } else {
      args[key] = val;
    }
  }
  
  var resultDiv = document.getElementById('modalResult');
  resultDiv.innerHTML = '<div class="result"><div class="loading">呼叫中...</div></div>';
  
  fetch(WORKER + '/call', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: currentTool.name, arguments: args })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    renderResult(data);
  })
  .catch(function(err) {
    resultDiv.innerHTML = '<div class="result error"><div class="result-text">錯誤:' +
                          err.message + '</div></div>';
  });
}

// 智慧型結果渲染
function renderResult(data) {
  var resultDiv = document.getElementById('modalResult');
  var isError = data && data.result && data.result.isError;
  var cls = isError ? 'error' : 'success';
  
  // 嘗試擷取最有用的文字內容
  var mainText = '';
  if (data && data.result && data.result.content) {
    var contents = data.result.content;
    for (var i = 0; i < contents.length; i++) {
      if (contents[i].type === 'text') {
        mainText += contents[i].text + '\n';
      }
    }
  } else if (data && data.error) {
    mainText = 'JSON-RPC 錯誤:' + (data.error.message || JSON.stringify(data.error));
  }
  
  // 試試看 mainText 是不是 JSON,如果是就 pretty print
  var displayText = mainText.trim();
  var isJson = false;
  try {
    var parsed = JSON.parse(displayText);
    displayText = JSON.stringify(parsed, null, 2);
    isJson = true;
  } catch (e) { /* 不是 JSON 就保持原樣 */ }
  
  var html = '<div class="result ' + cls + '">';
  if (displayText) {
    html += '<div class="result-text' + (isJson ? ' mono' : '') + '">' +
            escapeHtml(displayText) + '</div>';
  } else {
    html += '<div class="result-text mono">' + escapeHtml(JSON.stringify(data, null, 2)) + '</div>';
  }
  html += '<div class="result-toggle" id="toggleRaw">顯示原始 JSON</div>';
  html += '<div class="result-text mono" id="rawJson" style="display:none;margin-top:8px;">' +
          escapeHtml(JSON.stringify(data, null, 2)) + '</div>';
  html += '</div>';
  
  resultDiv.innerHTML = html;
  
  document.getElementById('toggleRaw').addEventListener('click', function() {
    var raw = document.getElementById('rawJson');
    raw.style.display = raw.style.display === 'none' ? 'block' : 'none';
    this.textContent = raw.style.display === 'none' ? '顯示原始 JSON' : '隱藏原始 JSON';
  });
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// 事件綁定
document.getElementById('searchInput').addEventListener('input', function() {
  renderTools(this.value);
});
document.getElementById('btnCall').addEventListener('click', callTool);
document.getElementById('btnClose').addEventListener('click', closeTool);
document.getElementById('modalBg').addEventListener('click', function(e) {
  if (e.target === this) closeTool();
});

// 啟動
loadTools();
</script>

</body>
</html>
