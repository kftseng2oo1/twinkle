<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🏠 房價儀表板</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif;
    background: #f4f6fb; color: #1a2138; font-size: 15px; padding-bottom: 40px;
  }
  header {
    background: linear-gradient(135deg, #2563eb, #1e40af);
    color: white; padding: 18px 16px; padding-top: calc(18px + env(safe-area-inset-top));
    display: flex; justify-content: space-between; align-items: center;
  }
  header h1 { margin: 0; font-size: 19px; }
  header .sub { font-size: 11px; opacity: 0.85; margin-top: 3px; }
  .fav-btn {
    background: rgba(255,255,255,0.2); border: none; color: white;
    padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer;
    -webkit-appearance: none;
  }

  .panel { background: white; margin: 12px; border-radius: 14px; padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: #64748b; margin-bottom: 6px; font-weight: 600; }
  select, input {
    width: 100%; padding: 12px; border: 1px solid #d1d9e6; border-radius: 10px;
    font-size: 16px; background: #f8fafc; color: #1a2138; -webkit-appearance: none;
  }
  .row { display: flex; gap: 10px; }
  .row .field { flex: 1; }

  .adv-toggle {
    font-size: 13px; color: #2563eb; cursor: pointer; padding: 8px 0;
    user-select: none; display: flex; align-items: center; gap: 4px;
  }
  .adv-panel { display: none; padding-top: 8px; border-top: 1px dashed #e2e8f0; margin-top: 8px; }
  .adv-panel.show { display: block; }
  .range-label { display: flex; justify-content: space-between; font-size: 12px; color: #64748b; margin-bottom: 4px; }
  .range-label .val { color: #2563eb; font-weight: 600; }
  input[type=range] { -webkit-appearance: none; height: 6px; background: #e2e8f0; border-radius: 3px; padding: 0; }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
    background: #2563eb; cursor: pointer;
  }
  .chip-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    padding: 8px 14px; border: 1px solid #d1d9e6; border-radius: 20px;
    font-size: 13px; background: #f8fafc; cursor: pointer; color: #475569;
  }
  .chip.active { background: #2563eb; color: white; border-color: #2563eb; }

  button.search {
    width: 100%; padding: 14px; background: #2563eb; color: white; border: none;
    border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;
    -webkit-appearance: none; margin-top: 8px;
  }
  button.search:active { background: #1d4ed8; }
  button.search:disabled { background: #94a3b8; }

  /* KPI 橫條 */
  .kpi-bar {
    display: flex; gap: 8px; overflow-x: auto; padding: 4px 12px 0;
    -webkit-overflow-scrolling: touch;
  }
  .kpi-bar::-webkit-scrollbar { display: none; }
  .kpi {
    background: white; border-radius: 12px; padding: 12px 16px; min-width: 110px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05); flex-shrink: 0;
  }
  .kpi .label { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
  .kpi .value { font-size: 18px; font-weight: 700; color: #1a2138; }
  .kpi .value.red { color: #dc2626; }
  .kpi .value.blue { color: #2563eb; }
  .kpi .unit { font-size: 11px; font-weight: 400; color: #94a3b8; }

  /* 工具列 */
  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px 4px; gap: 10px;
  }
  .toolbar select { width: auto; flex: 1; padding: 8px 12px; font-size: 14px; }
  .view-switch { display: flex; background: #e2e8f0; border-radius: 8px; padding: 2px; }
  .view-switch button {
    border: none; background: transparent; padding: 8px 14px; border-radius: 6px;
    font-size: 14px; cursor: pointer; color: #64748b; -webkit-appearance: none;
  }
  .view-switch button.active { background: white; color: #2563eb; font-weight: 600; }

  /* 卡片 */
  .card {
    background: white; margin: 0 12px 10px; border-radius: 12px; padding: 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05); border-left: 4px solid #2563eb; position: relative;
  }
  .card.special { border-left-color: #f59e0b; }
  .card .addr { font-size: 15px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; padding-right: 36px; }
  .card .price-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .card .total { font-size: 22px; font-weight: 700; color: #dc2626; }
  .card .total .unit { font-size: 13px; font-weight: 400; color: #64748b; }
  .card .perping { font-size: 13px; color: #2563eb; font-weight: 600; }
  .card .meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .card .tag { font-size: 12px; background: #eff3fb; color: #475569; padding: 3px 8px; border-radius: 6px; }
  .card .tag-indoor { background: #dcfce7; color: #15803d; font-weight: 600; }
  .card .park { margin-top: 8px; font-size: 13px; color: #475569; background: #f1f5f9; padding: 6px 10px; border-radius: 6px; }
  .card .adj-price { margin-top: 6px; font-size: 12px; color: #64748b; }
  .card .adj-price b { color: #2563eb; }
  .card .note { margin-top: 8px; font-size: 12px; color: #b45309; background: #fef3c7; padding: 6px 10px; border-radius: 6px; line-height: 1.4; }
  .card .heart {
    position: absolute; top: 12px; right: 12px; font-size: 22px; cursor: pointer;
    background: none; border: none; padding: 0; line-height: 1;
  }

  #map { display: none; height: 60vh; margin: 0 12px; border-radius: 12px; overflow: hidden; }
  #map.show { display: block; }

  .empty, .loading, .error { text-align: center; padding: 40px 20px; color: #64748b; font-size: 14px; }
  .error { color: #dc2626; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; margin: 0 auto 12px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div>
    <h1>🏠 房價儀表板</h1>
    <div class="sub">實價登錄 · Twinkle Hub</div>
  </div>
  <button class="fav-btn" id="favBtn">⭐ 收藏 (<span id="favCount">0</span>)</button>
</header>

<div class="panel">
  <div class="row">
    <div class="field">
      <label>縣市</label>
      <select id="city"></select>
    </div>
    <div class="field">
      <label>行政區</label>
      <select id="district"><option value="">全部</option></select>
    </div>
  </div>

  <div class="adv-toggle" id="advToggle">⚙️ 進階篩選 <span id="advArrow">▼</span></div>
  <div class="adv-panel" id="advPanel">
    <div class="field">
      <div class="range-label"><span>總價上限</span><span class="val" id="priceVal">不限</span></div>
      <input type="range" id="priceMax" min="0" max="10000" step="100" value="0">
    </div>
    <div class="field">
      <div class="range-label"><span>坪數下限</span><span class="val" id="areaVal">不限</span></div>
      <input type="range" id="areaMin" min="0" max="100" step="5" value="0">
    </div>
    <div class="field">
      <div class="range-label"><span>屋齡上限</span><span class="val" id="ageVal">不限</span></div>
      <input type="range" id="ageMax" min="0" max="50" step="5" value="0">
    </div>
    <div class="field">
      <label>建物型態</label>
      <div class="chip-group" id="typeChips">
        <div class="chip active" data-type="">不限</div>
        <div class="chip" data-type="住宅大樓">住宅大樓</div>
        <div class="chip" data-type="公寓">公寓</div>
        <div class="chip" data-type="透天">透天厝</div>
        <div class="chip" data-type="套房">套房</div>
      </div>
    </div>
    <div class="field">
      <label>電梯</label>
      <div class="chip-group" id="elevatorChips">
        <div class="chip active" data-ele="">不限</div>
        <div class="chip" data-ele="有">有電梯</div>
        <div class="chip" data-ele="無">無電梯</div>
      </div>
    </div>
  </div>

  <div class="field" style="margin-top:8px;">
    <label>查詢筆數</label>
    <select id="limit">
      <option value="30">30 筆</option>
      <option value="50" selected>50 筆</option>
    </select>
  </div>
  <button class="search" id="searchBtn">查詢</button>
</div>

<div class="kpi-bar" id="kpiBar"></div>

<div class="toolbar" id="toolbar" style="display:none;">
  <select id="sortSelect">
    <option value="date">最新成交</option>
    <option value="price_desc">總價高→低</option>
    <option value="price_asc">總價低→高</option>
    <option value="ping_desc">坪數大→小</option>
    <option value="perping_asc">均價低→高</option>
  </select>
  <div class="view-switch">
    <button id="listViewBtn" class="active">☰ 列表</button>
    <button id="mapViewBtn">🗺️ 地圖</button>
  </div>
</div>

<div id="results"><div class="empty">選擇條件後點查詢</div></div>
<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
var WORKER = 'https://twinklehub.kftseng2oo1.workers.dev';

// ── 行政區中心點座標(粗略,用於地圖標示)──
var DISTRICT_CENTER = {
  '臺中市北屯區': [24.1817, 120.6857], '臺中市西屯區': [24.1818, 120.6394],
  '臺中市南屯區': [24.1389, 120.6444], '臺中市北區': [24.1620, 120.6840],
  '臺中市西區': [24.1440, 120.6680], '臺中市東區': [24.1380, 120.7050],
  '臺中市南區': [24.1190, 120.6620], '臺中市中區': [24.1430, 120.6790],
  '臺中市太平區': [24.1267, 120.7185], '臺中市大里區': [24.0993, 120.6775],
  '臺中市豐原區': [24.2540, 120.7180], '臺中市沙鹿區': [24.2335, 120.5657],
  '臺北市大安區': [25.0265, 121.5435], '臺北市信義區': [25.0330, 121.5654],
  '臺北市中山區': [25.0640, 121.5330], '臺北市內湖區': [25.0697, 121.5945],
  '臺北市士林區': [25.0925, 121.5240], '臺北市松山區': [25.0500, 121.5577],
  '臺北市文山區': [24.9989, 121.5705], '臺北市北投區': [25.1320, 121.4985],
  '新北市板橋區': [25.0095, 121.4590], '新北市新莊區': [25.0359, 121.4324],
  '新北市中和區': [24.9990, 121.4985], '新北市永和區': [25.0078, 121.5160],
  '新北市新店區': [24.9670, 121.5420], '新北市三重區': [25.0615, 121.4880],
  '高雄市三民區': [22.6470, 120.3120], '高雄市左營區': [22.6890, 120.2950],
  '高雄市鼓山區': [22.6490, 120.2810], '高雄市前鎮區': [22.5870, 120.3290],
  '桃園市桃園區': [24.9890, 121.3010], '桃園市中壢區': [24.9530, 121.2250]
};
var CITY_CENTER = {
  '臺北市': [25.0375, 121.5637], '新北市': [25.0169, 121.4628],
  '桃園市': [24.9936, 121.3010], '臺中市': [24.1477, 120.6736],
  '臺南市': [22.9999, 120.2270], '高雄市': [22.6273, 120.3014],
  '基隆市': [25.1276, 121.7392], '新竹市': [24.8138, 120.9675]
};

var TW = {
  '臺北市': ['中正區','大同區','中山區','松山區','大安區','萬華區','信義區','士林區','北投區','內湖區','南港區','文山區'],
  '新北市': ['板橋區','新莊區','中和區','永和區','土城區','三重區','蘆洲區','新店區','汐止區','樹林區','三峽區','淡水區','林口區'],
  '桃園市': ['桃園區','中壢區','平鎮區','八德區','楊梅區','蘆竹區','龜山區','龍潭區','大溪區','大園區'],
  '臺中市': ['中區','東區','南區','西區','北區','北屯區','西屯區','南屯區','太平區','大里區','霧峰區','烏日區','豐原區','后里區','潭子區','大雅區','沙鹿區','龍井區','梧棲區','清水區'],
  '臺南市': ['中西區','東區','南區','北區','安平區','安南區','永康區','歸仁區','新化區','善化區','仁德區'],
  '高雄市': ['新興區','前金區','苓雅區','鹽埕區','鼓山區','旗津區','前鎮區','三民區','楠梓區','小港區','左營區','鳳山區','大寮區','岡山區'],
  '基隆市': ['仁愛區','信義區','中正區','中山區','安樂區','暖暖區','七堵區'],
  '新竹市': ['東區','北區','香山區']
};

// ── 狀態 ──
var currentResults = [];
var viewMode = 'list';
var mapInstance = null;
var advFilters = { type: '', elevator: '' };

// ── 收藏(localStorage,含防護)──
var STORAGE_KEY = 'lvr_favorites';
var memFallback = {}; // localStorage 不可用時的記憶體備援
var storageOk = (function() {
  try { localStorage.setItem('__t', '1'); localStorage.removeItem('__t'); return true; }
  catch (e) { return false; }
})();

function getFavorites() {
  if (!storageOk) return memFallback;
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch (e) { return {}; }
}
function saveFavorites(favs) {
  if (!storageOk) { memFallback = favs; return; }
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(favs)); } catch (e) {}
}
function toggleFavorite(item) {
  var favs = getFavorites();
  if (favs[item.id]) delete favs[item.id];
  else favs[item.id] = item;
  saveFavorites(favs);
  updateFavCount();
}
function isFavorited(id) { return !!getFavorites()[id]; }
function updateFavCount() {
  document.getElementById('favCount').textContent = Object.keys(getFavorites()).length;
}

// ── DOM ──
var cityEl = document.getElementById('city');
var districtEl = document.getElementById('district');
var limitEl = document.getElementById('limit');
var searchBtn = document.getElementById('searchBtn');
var resultsEl = document.getElementById('results');
var kpiBar = document.getElementById('kpiBar');
var toolbar = document.getElementById('toolbar');
var mapEl = document.getElementById('map');

// 縣市選單
Object.keys(TW).forEach(function(c) {
  var o = document.createElement('option'); o.value = c; o.textContent = c; cityEl.appendChild(o);
});
cityEl.value = '臺中市';
function updateDistricts() {
  districtEl.innerHTML = '<option value="">全部</option>';
  (TW[cityEl.value] || []).forEach(function(d) {
    var o = document.createElement('option'); o.value = d; o.textContent = d; districtEl.appendChild(o);
  });
}
cityEl.addEventListener('change', updateDistricts);
updateDistricts();

// 進階篩選展開
document.getElementById('advToggle').addEventListener('click', function() {
  var p = document.getElementById('advPanel');
  p.classList.toggle('show');
  document.getElementById('advArrow').textContent = p.classList.contains('show') ? '▲' : '▼';
});

// 滑桿
var priceMax = document.getElementById('priceMax');
priceMax.addEventListener('input', function() {
  document.getElementById('priceVal').textContent = this.value === '0' ? '不限' : (this.value + ' 萬');
});
var areaMin = document.getElementById('areaMin');
areaMin.addEventListener('input', function() {
  document.getElementById('areaVal').textContent = this.value === '0' ? '不限' : (this.value + ' 坪');
});
var ageMax = document.getElementById('ageMax');
ageMax.addEventListener('input', function() {
  document.getElementById('ageVal').textContent = this.value === '0' ? '不限' : (this.value + ' 年');
});

// 型態/電梯 chips
document.getElementById('typeChips').addEventListener('click', function(e) {
  if (!e.target.classList.contains('chip')) return;
  this.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
  e.target.classList.add('active');
  advFilters.type = e.target.getAttribute('data-type');
});
document.getElementById('elevatorChips').addEventListener('click', function(e) {
  if (!e.target.classList.contains('chip')) return;
  this.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
  e.target.classList.add('active');
  advFilters.elevator = e.target.getAttribute('data-ele');
});

// ── 格式化 ──
function fmtPrice(n) {
  if (!n) return '—';
  var wan = n / 10000;
  if (wan >= 10000) return (wan / 10000).toFixed(2) + ' 億';
  return Math.round(wan).toLocaleString() + ' 萬';
}
function fmtPerPing(n) {
  if (!n) return '';
  return (Math.round(n / 10000 * 10) / 10) + ' 萬/坪';
}
function rocToAge(buildDate) {
  if (!buildDate) return null;
  var s = String(buildDate).replace(/[^0-9]/g, '');
  var year = null;
  if (s.length >= 7) { var r = parseInt(s.slice(0,3),10); if (r>0&&r<200) year = r+1911; }
  else if (s.length === 4) year = parseInt(s,10);
  if (!year) return null;
  var age = new Date().getFullYear() - year;
  return (age < 0 || age > 120) ? null : age;
}

// ── 前端篩選(進階)──
function applyClientFilters(rows) {
  var pMax = parseInt(priceMax.value, 10) * 10000; // 萬→元
  var aMin = parseInt(areaMin.value, 10);
  var gMax = parseInt(ageMax.value, 10);
  return rows.filter(function(r) {
    if (pMax > 0 && r.totalPrice && r.totalPrice > pMax) return false;
    if (aMin > 0 && r.areaPing && r.areaPing < aMin) return false;
    if (gMax > 0) { var age = rocToAge(r.buildDate); if (age !== null && age > gMax) return false; }
    if (advFilters.type && (!r.type || r.type.indexOf(advFilters.type) === -1)) {
      // 透天厝特殊匹配
      if (!(advFilters.type === '透天' && r.type && r.type.indexOf('透天') !== -1)) return false;
    }
    if (advFilters.elevator && r.hasElevator !== advFilters.elevator) return false;
    return true;
  });
}

// ── 排序 ──
function sortRows(rows, mode) {
  var sorted = rows.slice();
  switch (mode) {
    case 'price_desc': sorted.sort(function(a,b){ return (b.totalPrice||0)-(a.totalPrice||0); }); break;
    case 'price_asc':  sorted.sort(function(a,b){ return (a.totalPrice||0)-(b.totalPrice||0); }); break;
    case 'ping_desc':  sorted.sort(function(a,b){ return (b.areaPing||0)-(a.areaPing||0); }); break;
    case 'perping_asc':sorted.sort(function(a,b){ return (a.pricePerPing||0)-(b.pricePerPing||0); }); break;
    default: sorted.sort(function(a,b){ return String(b.tradeDate||'').localeCompare(String(a.tradeDate||'')); });
  }
  return sorted;
}

// ── KPI 計算 ──
function renderKPI(rows) {
  if (rows.length === 0) { kpiBar.innerHTML = ''; return; }
  var prices = rows.map(function(r){ return r.totalPrice; }).filter(Boolean);
  var perpings = rows.map(function(r){ return r.pricePerPing; }).filter(Boolean);
  var avgPrice = prices.reduce(function(a,b){return a+b;},0) / prices.length;
  var avgPerping = perpings.reduce(function(a,b){return a+b;},0) / perpings.length;
  var maxP = Math.max.apply(null, prices);
  var minP = Math.min.apply(null, prices);

  kpiBar.innerHTML =
    kpiCard('筆數', rows.length, '', '') +
    kpiCard('平均總價', fmtPrice(avgPrice), '', 'red') +
    kpiCard('平均均價', fmtPerPing(avgPerping), '', 'blue') +
    kpiCard('最高總價', fmtPrice(maxP), '', '') +
    kpiCard('最低總價', fmtPrice(minP), '', '');
}
function kpiCard(label, value, unit, cls) {
  return '<div class="kpi"><div class="label">' + label + '</div>' +
         '<div class="value ' + (cls||'') + '">' + value +
         (unit ? '<span class="unit"> ' + unit + '</span>' : '') + '</div></div>';
}

// ── 渲染列表 ──
function renderList(rows) {
  if (rows.length === 0) { resultsEl.innerHTML = '<div class="empty">查無符合篩選的資料</div>'; return; }
  var html = '';
  rows.forEach(function(r) {
    var faved = isFavorited(r.id);
    var age = rocToAge(r.buildDate);
    html += '<div class="card' + (r.isSpecial ? ' special' : '') + '">';
    html += '<button class="heart" data-id="' + r.id + '">' + (faved ? '🧡' : '🤍') + '</button>';
    html += '<div class="addr">' + (r.address || '地址未提供') + '</div>';
    html += '<div class="price-row">';
    html += '<span class="total">' + fmtPrice(r.totalPrice) + '<span class="unit"> 元</span></span>';
    if (r.pricePerPing) html += '<span class="perping">' + fmtPerPing(r.pricePerPing) + '</span>';
    html += '</div><div class="meta">';
    if (r.type)     html += '<span class="tag">' + r.type + '</span>';
    if (r.layout)   html += '<span class="tag">' + r.layout + '</span>';
    if (r.areaPing) html += '<span class="tag">權狀 ' + r.areaPing + ' 坪</span>';
    if (r.indoorPing) html += '<span class="tag tag-indoor">室內 ' + r.indoorPing + ' 坪</span>';
    if (r.publicRatio) html += '<span class="tag">公設 ' + r.publicRatio + '%</span>';
    if (r.floor)    html += '<span class="tag">' + r.floor + (r.totalFloor ? '/' + r.totalFloor : '') + '</span>';
    if (age !== null) html += '<span class="tag">屋齡 ' + age + ' 年</span>';
    if (r.tradeDate) html += '<span class="tag">' + r.tradeDate + '</span>';
    if (r.hasElevator) html += '<span class="tag">電梯' + r.hasElevator + '</span>';
    html += '</div>';
    // 車位資訊
    if (r.parkType || r.parkPrice) {
      html += '<div class="park">🚗 ' + (r.parkType || '車位');
      if (r.parkPing) html += ' · ' + r.parkPing + ' 坪';
      if (r.parkPrice) html += ' · ' + fmtPrice(r.parkPrice) + ' 元';
      html += '</div>';
    }
    // 扣車位後房屋實際均價(差異明顯才顯示)
    if (r.pricePerPingNoPark && r.pricePerPing &&
        Math.abs(r.pricePerPingNoPark - r.pricePerPing) > 10000) {
      html += '<div class="adj-price">扣車位實際均價 <b>' + fmtPerPing(r.pricePerPingNoPark) + '</b></div>';
    }
    if (r.isSpecial) html += '<div class="note">⚠️ ' + r.note + '</div>';
    html += '</div>';
  });
  resultsEl.innerHTML = html;

  // 綁定愛心
  resultsEl.querySelectorAll('.heart').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = this.getAttribute('data-id');
      var item = currentResults.filter(function(r){ return r.id === id; })[0];
      if (item) { toggleFavorite(item); this.textContent = isFavorited(id) ? '🧡' : '🤍'; }
    });
  });
}

// ── 地圖 ──
function renderMap(rows, city, district) {
  if (!mapInstance) {
    mapInstance = L.map('map').setView([24.1477, 120.6736], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap', maxZoom: 18
    }).addTo(mapInstance);
  }
  // 清除舊標記
  mapInstance.eachLayer(function(layer) {
    if (layer instanceof L.Marker || layer instanceof L.CircleMarker) mapInstance.removeLayer(layer);
  });

  var key = city + district;
  var center = DISTRICT_CENTER[key] || CITY_CENTER[city] || [24.1477, 120.6736];
  mapInstance.setView(center, district ? 14 : 11);

  // 在中心點周圍散佈標記(粗略,因無精確座標)
  rows.forEach(function(r, i) {
    var jitter = 0.012;
    var lat = center[0] + (Math.random() - 0.5) * jitter;
    var lng = center[1] + (Math.random() - 0.5) * jitter;
    var color = r.isSpecial ? '#f59e0b' : '#2563eb';
    var marker = L.circleMarker([lat, lng], {
      radius: 8, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.85
    }).addTo(mapInstance);
    marker.bindPopup(
      '<b>' + (r.address || '') + '</b><br>' +
      '總價 ' + fmtPrice(r.totalPrice) + ' 元<br>' +
      (r.pricePerPing ? '均價 ' + fmtPerPing(r.pricePerPing) + '<br>' : '') +
      (r.layout || '') + ' ' + (r.areaPing ? r.areaPing + ' 坪' : '')
    );
  });
  setTimeout(function() { mapInstance.invalidateSize(); }, 100);
}

// ── 視圖切換 ──
function setView(mode) {
  viewMode = mode;
  var listBtn = document.getElementById('listViewBtn');
  var mapBtn = document.getElementById('mapViewBtn');
  if (mode === 'map') {
    listBtn.classList.remove('active'); mapBtn.classList.add('active');
    resultsEl.style.display = 'none'; mapEl.classList.add('show');
    renderMap(getDisplayRows(), cityEl.value, districtEl.value);
  } else {
    mapBtn.classList.remove('active'); listBtn.classList.add('active');
    resultsEl.style.display = 'block'; mapEl.classList.remove('show');
  }
}
document.getElementById('listViewBtn').addEventListener('click', function(){ setView('list'); });
document.getElementById('mapViewBtn').addEventListener('click', function(){ setView('map'); });

// ── 取得目前要顯示的資料(套用篩選 + 排序)──
function getDisplayRows() {
  var filtered = applyClientFilters(currentResults);
  return sortRows(filtered, document.getElementById('sortSelect').value);
}
function refreshDisplay() {
  var rows = getDisplayRows();
  renderKPI(rows);
  if (viewMode === 'list') renderList(rows);
  else renderMap(rows, cityEl.value, districtEl.value);
}
document.getElementById('sortSelect').addEventListener('change', refreshDisplay);

// ── 查詢 ──
function search() {
  var city = cityEl.value, district = districtEl.value, limit = limitEl.value;
  searchBtn.disabled = true; searchBtn.textContent = '查詢中...';
  kpiBar.innerHTML = ''; toolbar.style.display = 'none';
  resultsEl.style.display = 'block'; mapEl.classList.remove('show');
  resultsEl.innerHTML = '<div class="loading"><div class="spinner"></div>查詢中...</div>';

  var qs = '?city=' + encodeURIComponent(city) + '&district=' + encodeURIComponent(district) + '&limit=' + limit;
  fetch(WORKER + '/lvr' + qs)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      searchBtn.disabled = false; searchBtn.textContent = '查詢';
      if (!data.success) {
        resultsEl.innerHTML = '<div class="error">❌ ' + (data.message || '查詢失敗') + '</div>'; return;
      }
      currentResults = data.results || [];
      if (currentResults.length === 0) {
        resultsEl.innerHTML = '<div class="empty">查無資料</div>'; return;
      }
      toolbar.style.display = 'flex';
      setView('list');
      refreshDisplay();
    })
    .catch(function(err) {
      searchBtn.disabled = false; searchBtn.textContent = '查詢';
      resultsEl.innerHTML = '<div class="error">❌ 連線錯誤:' + err.message + '</div>';
    });
}
searchBtn.addEventListener('click', search);

// ── 收藏檢視 ──
document.getElementById('favBtn').addEventListener('click', function() {
  var favs = getFavorites();
  var items = Object.keys(favs).map(function(k){ return favs[k]; });
  if (items.length === 0) {
    resultsEl.innerHTML = '<div class="empty">還沒有收藏,點卡片右上的 🤍 加入</div>';
    kpiBar.innerHTML = ''; toolbar.style.display = 'none';
    resultsEl.style.display = 'block'; mapEl.classList.remove('show');
    return;
  }
  currentResults = items;
  toolbar.style.display = 'flex';
  setView('list');
  refreshDisplay();
});

updateFavCount();
if (!storageOk) {
  console.warn('localStorage 不可用(可能在預覽環境),收藏改用記憶體暫存,部署到 GitHub Pages 後正常');
}
</script>
