<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Twinkle 小幫手</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif;
    background: #0a0e27; color: #e4e6f0; font-size: 15px;
    display: flex; flex-direction: column;
  }
  
  header {
    padding: 12px 16px; background: #1a1f3a;
    border-bottom: 1px solid #2a3050; flex-shrink: 0;
  }
  header h1 { margin: 0; font-size: 17px; color: #ffd700; }
  header .sub { font-size: 12px; color: #8892b0; margin-top: 2px; }
  
  #chat {
    flex: 1; overflow-y: auto; padding: 16px 12px;
    -webkit-overflow-scrolling: touch;
  }
  
  .msg { margin-bottom: 14px; display: flex; flex-direction: column; }
  .msg.user { align-items: flex-end; }
  .msg.assistant { align-items: flex-start; }
  
  .bubble {
    max-width: 88%; padding: 10px 14px; border-radius: 16px;
    line-height: 1.55; white-space: pre-wrap; word-break: break-word;
    font-size: 15px;
  }
  .user .bubble {
    background: #ffd700; color: #0a0e27;
    border-bottom-right-radius: 4px;
  }
  .assistant .bubble {
    background: #1a1f3a; color: #e4e6f0; border: 1px solid #2a3050;
    border-bottom-left-radius: 4px;
  }
  
  .tool-call {
    background: #050816; border: 1px solid #2a3050;
    border-radius: 8px; padding: 8px 10px; margin-top: 6px;
    font-size: 12px; color: #64ffda; font-family: ui-monospace, monospace;
    max-width: 88%; overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .tool-call .label { color: #8892b0; margin-bottom: 2px; }
  .tool-call pre { margin: 0; white-space: pre-wrap; word-break: break-all; }
  
  .thinking {
    color: #8892b0; font-style: italic; font-size: 13px;
    padding: 4px 14px;
  }
  
  footer {
    padding: 10px 12px; background: #1a1f3a;
    border-top: 1px solid #2a3050; flex-shrink: 0;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
  }
  .input-row { display: flex; gap: 8px; }
  textarea {
    flex: 1; background: #0a0e27; color: #e4e6f0;
    border: 1px solid #3a4070; padding: 10px 12px; border-radius: 20px;
    font-size: 16px; -webkit-appearance: none; resize: none;
    min-height: 40px; max-height: 120px; font-family: inherit;
    line-height: 1.4;
  }
  button {
    background: #ffd700; color: #0a0e27; border: none;
    width: 44px; height: 44px; border-radius: 50%;
    font-size: 20px; cursor: pointer; flex-shrink: 0;
    -webkit-appearance: none; font-weight: 600;
  }
  button:disabled { background: #3a4070; color: #8892b0; }
  
  .examples {
    display: flex; gap: 6px; overflow-x: auto; padding: 0 0 8px;
    -webkit-overflow-scrolling: touch;
  }
  .examples::-webkit-scrollbar { display: none; }
  .example-chip {
    background: #2a3050; color: #64ffda; border: 1px solid #3a4070;
    padding: 6px 12px; border-radius: 16px; font-size: 13px;
    white-space: nowrap; cursor: pointer; flex-shrink: 0;
  }
  .example-chip:active { background: #3a4070; }
</style>
</head>
<body>

<header>
  <h1>🌟 Twinkle 小幫手</h1>
  <div class="sub">用中文問,AI 自動查 Twinkle Hub</div>
</header>

<div id="chat">
  <div class="msg assistant">
    <div class="bubble">嗨!我可以幫你查詢台灣政府開放資料、地理資訊、政府採購、實價登錄、判決書、立法院議案等等。

直接用中文問我就好,例如:
• 找台北市信義區的避難所
• 國防部去年的決標金額前 10 大
• 紀文惠法官最近的判決</div>
  </div>
</div>

<footer>
  <div class="examples" id="examples">
    <div class="example-chip">高雄市今天有什麼活動</div>
    <div class="example-chip">台中市的健保藥局</div>
    <div class="example-chip">立法院本屆民法相關議案</div>
    <div class="example-chip">附近的寺廟(請給我座標)</div>
    <div class="example-chip">最近的實價登錄</div>
  </div>
  <div class="input-row">
    <textarea id="input" placeholder="輸入問題..." rows="1"></textarea>
    <button id="send">➤</button>
  </div>
</footer>

<script>
var TWINKLE_WORKER = 'https://twinklehub.kftseng2oo1.workers.dev';
var ARCAR_WORKER = 'https://arcar.kftseng2oo1.workers.dev'; // Claude API proxy
var MAX_ITERATIONS = 8; // 防無窮迴圈
var conversationHistory = [];
var toolsCache = null;

var chatEl = document.getElementById('chat');
var inputEl = document.getElementById('input');
var sendBtn = document.getElementById('send');

// 自動 resize textarea
inputEl.addEventListener('input', function() {
  this.style.height = '40px';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// 範例 chip 點擊
document.querySelectorAll('.example-chip').forEach(function(chip) {
  chip.addEventListener('click', function() {
    inputEl.value = this.textContent;
    inputEl.dispatchEvent(new Event('input'));
    inputEl.focus();
  });
});

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
                  .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function addMessage(role, text) {
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div>';
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function addThinking(text) {
  var div = document.createElement('div');
  div.className = 'thinking';
  div.textContent = '⚡ ' + text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function addToolCall(name, args, result) {
  var div = document.createElement('div');
  div.className = 'msg assistant';
  var html = '<div class="tool-call">';
  html += '<div class="label">🔧 呼叫 ' + escapeHtml(name) + '</div>';
  html += '<pre>' + escapeHtml(JSON.stringify(args, null, 2)) + '</pre>';
  if (result !== undefined) {
    html += '<div class="label" style="margin-top:6px;">📦 結果</div>';
    var resultStr = typeof result === 'string' ? result : JSON.stringify(result, null, 2);
    if (resultStr.length > 500) resultStr = resultStr.slice(0, 500) + '...(已截斷)';
    html += '<pre>' + escapeHtml(resultStr) + '</pre>';
  }
  html += '</div>';
  div.innerHTML = html;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

// 載入工具清單
function loadTools() {
  if (toolsCache) return Promise.resolve(toolsCache);
  return fetch(TWINKLE_WORKER + '/tools')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.result && data.result.tools) {
        toolsCache = data.result.tools;
        return toolsCache;
      }
      throw new Error('無法取得工具清單');
    });
}

// 把 Twinkle 工具轉成 Claude API 的 tools 格式
function twinkleToClaudeTools(twinkleTools) {
  return twinkleTools.map(function(t) {
    return {
      name: t.name.replace(/-/g, '_'), // Claude tool 名稱限制
      description: (t.description || '').slice(0, 1024),
      input_schema: t.inputSchema || { type: 'object', properties: {} }
    };
  });
}

// 呼叫 Twinkle 工具
function callTwinkleTool(name, args) {
  // 還原工具名稱
  var realName = name.replace(/_/g, '-');
  // 但 search_datasets 這類本身有底線的要保留 — 我們用映射表
  var toolMatch = toolsCache.filter(function(t) {
    return t.name.replace(/-/g, '_') === name;
  })[0];
  if (toolMatch) realName = toolMatch.name;
  
  return fetch(TWINKLE_WORKER + '/call', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: realName, arguments: args })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data && data.result && data.result.content) {
      var text = '';
      data.result.content.forEach(function(c) {
        if (c.type === 'text') text += c.text + '\n';
      });
      return text.trim();
    }
    return JSON.stringify(data);
  });
}

// 呼叫 Claude API(透過你的 arcar proxy)
function callClaude(messages, tools) {
  return fetch(ARCAR_WORKER, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2048,
      system: '你是台灣資料查詢小幫手,可以使用 Twinkle Hub 的工具查詢台灣政府開放資料、地理資訊、政府採購、實價登錄、判決書、立法院議案等。' +
              '請用繁體中文回答,簡潔扼要。' +
              '挑工具時請先讀工具描述,選最適合的 fast-path 工具(例如查實價登錄用 query_rows("lvr-trades", ...) 而不是 search_datasets)。' +
              '查詢結果太長時請摘要重點,不要全文貼出。',
      messages: messages,
      tools: tools
    })
  })
  .then(function(r) { return r.json(); });
}

// 主對話循環
function chat(userText) {
  inputEl.disabled = true;
  sendBtn.disabled = true;
  
  addMessage('user', userText);
  conversationHistory.push({ role: 'user', content: userText });
  
  var thinking = addThinking('載入工具中...');
  
  loadTools()
    .then(function(tools) {
      var claudeTools = twinkleToClaudeTools(tools);
      thinking.textContent = '⚡ Claude 思考中...';
      return iterate(claudeTools, 0);
    })
    .catch(function(err) {
      thinking.remove();
      addMessage('assistant', '❌ 錯誤:' + err.message);
    })
    .then(function() {
      if (thinking.parentNode) thinking.remove();
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    });
}

function iterate(claudeTools, depth) {
  if (depth >= MAX_ITERATIONS) {
    addMessage('assistant', '⚠️ 達到最大查詢次數,請重新提問或縮小範圍');
    return Promise.resolve();
  }
  
  return callClaude(conversationHistory, claudeTools)
    .then(function(response) {
      if (!response || !response.content) {
        throw new Error('Claude 沒有回應:' + JSON.stringify(response));
      }
      
      // 收集本輪的文字與工具呼叫
      var textParts = [];
      var toolUses = [];
      response.content.forEach(function(block) {
        if (block.type === 'text') textParts.push(block.text);
        if (block.type === 'tool_use') toolUses.push(block);
      });
      
      // 顯示 Claude 的文字回應
      if (textParts.length > 0) {
        addMessage('assistant', textParts.join('\n'));
      }
      
      // 把 assistant 的回應加進歷史
      conversationHistory.push({ role: 'assistant', content: response.content });
      
      // 如果沒有工具呼叫,結束
      if (toolUses.length === 0) {
        return;
      }
      
      // 執行所有工具呼叫
      var toolResults = [];
      var promise = Promise.resolve();
      toolUses.forEach(function(tu) {
        promise = promise.then(function() {
          return callTwinkleTool(tu.name, tu.input)
            .then(function(result) {
              addToolCall(tu.name, tu.input, result);
              toolResults.push({
                type: 'tool_result',
                tool_use_id: tu.id,
                content: result
              });
            })
            .catch(function(err) {
              addToolCall(tu.name, tu.input, '錯誤:' + err.message);
              toolResults.push({
                type: 'tool_result',
                tool_use_id: tu.id,
                content: '錯誤:' + err.message,
                is_error: true
              });
            });
        });
      });
      
      return promise.then(function() {
        // 把工具結果加進歷史,繼續下一輪
        conversationHistory.push({ role: 'user', content: toolResults });
        return iterate(claudeTools, depth + 1);
      });
    });
}

sendBtn.addEventListener('click', function() {
  var text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  inputEl.style.height = '40px';
  chat(text);
});

inputEl.addEventListener('keydown', function(e) {
  // Enter 送出(Shift+Enter 換行)
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});
</script>

</body>
</html>
