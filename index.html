<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🏠 實價登錄查詢</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif;
    background: #f4f6fb; color: #1a2138; font-size: 15px;
    padding: 0 0 40px;
  }
  header {
    background: linear-gradient(135deg, #2563eb, #1e40af);
    color: white; padding: 20px 16px; padding-top: calc(20px + env(safe-area-inset-top));
  }
  header h1 { margin: 0; font-size: 20px; }
  header .sub { font-size: 12px; opacity: 0.85; margin-top: 4px; }

  .panel {
    background: white; margin: 12px; border-radius: 14px; padding: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: #64748b; margin-bottom: 6px; font-weight: 600; }
  select, input {
    width: 100%; padding: 12px; border: 1px solid #d1d9e6; border-radius: 10px;
    font-size: 16px; background: #f8fafc; color: #1a2138; -webkit-appearance: none;
  }
  .row { display: flex; gap: 10px; }
  .row .field { flex: 1; }

  button.search {
    width: 100%; padding: 14px; background: #2563eb; color: white;
    border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
    cursor: pointer; -webkit-appearance: none; margin-top: 4px;
  }
  button.search:active { background: #1d4ed8; }
  button.search:disabled { background: #94a3b8; }

  .stats {
    font-size: 13px; color: #64748b; padding: 4px 16px; display: flex;
    justify-content: space-between; align-items: center;
  }
  .stats .cached { color: #16a34a; font-size: 11px; }

  .card {
    background: white; margin: 0 12px 10px; border-radius: 12px; padding: 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05); border-left: 4px solid #2563eb;
  }
  .card.special { border-left-color: #f59e0b; }
  .card .note {
    margin-top: 8px; font-size: 12px; color: #b45309;
    background: #fef3c7; padding: 6px 10px; border-radius: 6px; line-height: 1.4;
  }
  .card .addr { font-size: 15px; font-weight: 600; color: #1a2138; margin-bottom: 8px; line-height: 1.4; }
  .card .price-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .card .total { font-size: 22px; font-weight: 700; color: #dc2626; }
  .card .total .unit { font-size: 13px; font-weight: 400; color: #64748b; }
  .card .perping { font-size: 13px; color: #2563eb; font-weight: 600; }
  .card .meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .card .tag {
    font-size: 12px; background: #eff3fb; color: #475569;
    padding: 3px 8px; border-radius: 6px;
  }

  .empty, .loading, .error {
    text-align: center; padding: 40px 20px; color: #64748b; font-size: 14px;
  }
  .error { color: #dc2626; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #2563eb;
    border-radius: 50%; margin: 0 auto 12px; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>🏠 實價登錄查詢</h1>
  <div class="sub">資料來源:Twinkle Hub · 已清洗瘦身</div>
</header>

<div class="panel">
  <div class="row">
    <div class="field">
      <label>縣市</label>
      <select id="city"></select>
    </div>
    <div class="field">
      <label>行政區</label>
      <select id="district"><option value="">全部</option></select>
    </div>
  </div>
  <div class="field">
    <label>顯示筆數</label>
    <select id="limit">
      <option value="20">20 筆</option>
      <option value="30">30 筆</option>
      <option value="50">50 筆</option>
    </select>
  </div>
  <button class="search" id="searchBtn">查詢</button>
</div>

<div class="stats" id="stats"></div>
<div id="results">
  <div class="empty">選擇縣市與行政區後點查詢</div>
</div>

<script>
var WORKER = 'https://twinklehub.kftseng2oo1.workers.dev';

// 台灣縣市 → 行政區(精簡常用版,可擴充)
var TW = {
  '臺北市': ['中正區','大同區','中山區','松山區','大安區','萬華區','信義區','士林區','北投區','內湖區','南港區','文山區'],
  '新北市': ['板橋區','新莊區','中和區','永和區','土城區','三重區','蘆洲區','新店區','汐止區','樹林區','三峽區','淡水區','林口區','五股區','泰山區'],
  '桃園市': ['桃園區','中壢區','平鎮區','八德區','楊梅區','蘆竹區','龜山區','龍潭區','大溪區','大園區'],
  '臺中市': ['中區','東區','南區','西區','北區','北屯區','西屯區','南屯區','太平區','大里區','霧峰區','烏日區','豐原區','后里區','潭子區','大雅區','沙鹿區','龍井區','梧棲區','清水區'],
  '臺南市': ['中西區','東區','南區','北區','安平區','安南區','永康區','歸仁區','新化區','善化區','仁德區'],
  '高雄市': ['新興區','前金區','苓雅區','鹽埕區','鼓山區','旗津區','前鎮區','三民區','楠梓區','小港區','左營區','鳳山區','大寮區','岡山區','鳥松區'],
  '基隆市': ['仁愛區','信義區','中正區','中山區','安樂區','暖暖區','七堵區'],
  '新竹市': ['東區','北區','香山區'],
  '新竹縣': ['竹北市','竹東鎮','新埔鎮','關西鎮','湖口鄉','新豐鄉','芎林鄉'],
  '苗栗縣': ['苗栗市','頭份市','竹南鎮','後龍鎮','通霄鎮','苑裡鎮'],
  '彰化縣': ['彰化市','員林市','和美鎮','鹿港鎮','溪湖鎮','二林鎮','田中鎮'],
  '南投縣': ['南投市','埔里鎮','草屯鎮','竹山鎮','集集鎮'],
  '雲林縣': ['斗六市','斗南鎮','虎尾鎮','西螺鎮','北港鎮'],
  '嘉義市': ['東區','西區'],
  '嘉義縣': ['太保市','朴子市','布袋鎮','大林鎮','民雄鄉'],
  '屏東縣': ['屏東市','潮州鎮','東港鎮','恆春鎮','內埔鄉'],
  '宜蘭縣': ['宜蘭市','羅東鎮','蘇澳鎮','頭城鎮','礁溪鄉'],
  '花蓮縣': ['花蓮市','鳳林鎮','玉里鎮','吉安鄉','新城鄉'],
  '臺東縣': ['臺東市','成功鎮','關山鎮'],
  '澎湖縣': ['馬公市','湖西鄉','白沙鄉'],
  '金門縣': ['金城鎮','金湖鎮','金沙鎮','金寧鄉'],
  '連江縣': ['南竿鄉','北竿鄉']
};

var cityEl = document.getElementById('city');
var districtEl = document.getElementById('district');
var limitEl = document.getElementById('limit');
var searchBtn = document.getElementById('searchBtn');
var resultsEl = document.getElementById('results');
var statsEl = document.getElementById('stats');

// 初始化縣市選單
Object.keys(TW).forEach(function(c) {
  var opt = document.createElement('option');
  opt.value = c; opt.textContent = c;
  cityEl.appendChild(opt);
});
cityEl.value = '臺中市'; // 你在台中,預設台中

function updateDistricts() {
  var city = cityEl.value;
  districtEl.innerHTML = '<option value="">全部</option>';
  (TW[city] || []).forEach(function(d) {
    var opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    districtEl.appendChild(opt);
  });
}
cityEl.addEventListener('change', updateDistricts);
updateDistricts();

function fmtPrice(n) {
  if (!n) return '—';
  // 元 → 萬元
  var wan = n / 10000;
  if (wan >= 10000) return (wan / 10000).toFixed(2) + ' 億';
  return Math.round(wan).toLocaleString() + ' 萬';
}

function fmtPerPing(n) {
  if (!n) return '';
  var wan = Math.round(n / 10000 * 10) / 10;
  return wan + ' 萬/坪';
}

// 建築完成年月 → 屋齡(支援民國年 yyymmdd 或西元)
function fmtAge(buildDate) {
  if (!buildDate) return '';
  var s = String(buildDate).replace(/[^0-9]/g, '');
  var year = null;
  if (s.length >= 7) {
    // 民國 yyymmdd(如 0850612 = 民國85年)
    var rocY = parseInt(s.slice(0, 3), 10);
    if (rocY > 0 && rocY < 200) year = rocY + 1911;
  } else if (s.length >= 6) {
    var y6 = parseInt(s.slice(0, 2), 10);
    year = (y6 > 50 ? 1900 : 2000) + y6; // 粗略推測
  } else if (s.length === 4) {
    year = parseInt(s, 10);
  }
  if (!year) return '';
  var age = new Date().getFullYear() - year;
  if (age < 0 || age > 120) return '';
  return '屋齡 ' + age + ' 年';
}

function search() {
  var city = cityEl.value;
  var district = districtEl.value;
  var limit = limitEl.value;

  searchBtn.disabled = true;
  searchBtn.textContent = '查詢中...';
  statsEl.innerHTML = '';
  resultsEl.innerHTML = '<div class="loading"><div class="spinner"></div>正在查詢實價登錄...</div>';

  var qs = '?city=' + encodeURIComponent(city) +
           '&district=' + encodeURIComponent(district) +
           '&limit=' + limit;

  fetch(WORKER + '/lvr' + qs)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      searchBtn.disabled = false;
      searchBtn.textContent = '查詢';

      if (!data.success) {
        resultsEl.innerHTML = '<div class="error">❌ ' +
          (data.message || '查詢失敗') + '<br><small>' +
          (data.error || '') + '</small></div>';
        return;
      }

      if (!data.results || data.results.length === 0) {
        resultsEl.innerHTML = '<div class="empty">查無資料,試試其他行政區</div>';
        return;
      }

      statsEl.innerHTML = '<span>共 ' + data.count + ' 筆</span>' +
        (data._cached ? '<span class="cached">⚡ 快取</span>' : '');

      var html = '';
      data.results.forEach(function(r) {
        html += '<div class="card' + (r.isSpecial ? ' special' : '') + '">';
        html += '<div class="addr">' + (r.address || '地址未提供') + '</div>';
        html += '<div class="price-row">';
        html += '<span class="total">' + fmtPrice(r.totalPrice) + '<span class="unit"> 元</span></span>';
        if (r.pricePerPing) html += '<span class="perping">' + fmtPerPing(r.pricePerPing) + '</span>';
        html += '</div>';
        html += '<div class="meta">';
        if (r.type)      html += '<span class="tag">' + r.type + '</span>';
        if (r.layout)    html += '<span class="tag">' + r.layout + '</span>';
        if (r.areaPing)  html += '<span class="tag">' + r.areaPing + ' 坪</span>';
        if (r.floor)     html += '<span class="tag">' + r.floor +
                                  (r.totalFloor ? '/' + r.totalFloor : '') + '</span>';
        if (r.buildDate) html += '<span class="tag">' + fmtAge(r.buildDate) + '</span>';
        if (r.tradeDate) html += '<span class="tag">' + r.tradeDate + '</span>';
        if (r.hasElevator) html += '<span class="tag">電梯' + r.hasElevator + '</span>';
        html += '</div>';
        // 特殊交易備註(親友交易/急買急賣/含增建等)
        if (r.isSpecial) {
          html += '<div class="note">⚠️ ' + r.note + '</div>';
        }
        html += '</div>';
      });
      resultsEl.innerHTML = html;
    })
    .catch(function(err) {
      searchBtn.disabled = false;
      searchBtn.textContent = '查詢';
      resultsEl.innerHTML = '<div class="error">❌ 連線錯誤:' + err.message + '</div>';
    });
}

searchBtn.addEventListener('click', search);
</script>

</body>
</html>
