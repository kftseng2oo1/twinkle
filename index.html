<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Twinkle Hub 測試台</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif;
    margin: 0; padding: 16px; background: #0a0e27; color: #e4e6f0;
    min-height: 100vh; font-size: 15px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; color: #ffd700; }
  .sub { color: #8892b0; font-size: 13px; margin-bottom: 20px; }
  .card {
    background: #1a1f3a; border-radius: 12px; padding: 14px;
    margin-bottom: 12px; border: 1px solid #2a3050;
  }
  .card h3 { margin: 0 0 10px; font-size: 15px; color: #64ffda; }
  button {
    background: #2a3050; color: #e4e6f0; border: 1px solid #3a4070;
    padding: 10px 14px; border-radius: 8px; font-size: 14px;
    width: 100%; margin-top: 8px; cursor: pointer;
    -webkit-appearance: none;
  }
  button:active { background: #3a4070; }
  button.primary { background: #ffd700; color: #0a0e27; font-weight: 600; border: none; }
  input {
    width: 100%; background: #0a0e27; color: #e4e6f0;
    border: 1px solid #3a4070; padding: 12px; border-radius: 8px;
    font-size: 16px; -webkit-appearance: none;
  }
  pre {
    background: #050816; padding: 12px; border-radius: 8px;
    overflow-x: auto; font-size: 13px; max-height: 400px;
    color: #64ffda; margin: 8px 0 0; white-space: pre-wrap;
    word-break: break-all; line-height: 1.5;
    -webkit-overflow-scrolling: touch;
  }
  .label { font-size: 12px; color: #8892b0; margin-bottom: 4px; }
  .row { display: flex; gap: 8px; }
  .row input { flex: 1; }
</style>
</head>
<body>

<h1>🌟 Twinkle Hub 測試台</h1>
<div class="sub">透過 twinklehub.kftseng2oo1.workers.dev</div>

<div class="card">
  <h3>📋 列出所有工具</h3>
  <button class="primary" id="btnList">取得工具清單</button>
  <pre id="outList">尚未呼叫</pre>
</div>

<div class="card">
  <h3>📅 民國年 → 西元年</h3>
  <div class="label">輸入民國年</div>
  <input type="number" id="rocYear" value="113" placeholder="例如 113">
  <button id="btnRoc">轉換</button>
  <pre id="outRoc">尚未呼叫</pre>
</div>

<div class="card">
  <h3>🆔 身分證驗證</h3>
  <div class="label">輸入身分證號碼</div>
  <input type="text" id="idNum" value="A123456789" placeholder="例如 A123456789">
  <button id="btnId">驗證</button>
  <pre id="outId">尚未呼叫</pre>
</div>

<div class="card">
  <h3>🔍 政府開放資料搜尋</h3>
  <div class="label">關鍵字</div>
  <input type="text" id="searchQ" value="紫微" placeholder="例如 紫微、農曆、樂透">
  <button id="btnSearch">搜尋 data.gov.tw</button>
  <pre id="outSearch">尚未呼叫</pre>
</div>

<script>
// iOS WebView 相容寫法 — 避免 ES6+ 進階語法
var WORKER = 'https://twinklehub.kftseng2oo1.workers.dev';

function callTool(name, args, outId) {
  var out = document.getElementById(outId);
  out.textContent = '呼叫中...';
  
  fetch(WORKER + '/call', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name, arguments: args })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    out.textContent = JSON.stringify(data, null, 2);
  })
  .catch(function(err) {
    out.textContent = '錯誤: ' + err.message;
  });
}

document.getElementById('btnList').addEventListener('click', function() {
  var out = document.getElementById('outList');
  out.textContent = '呼叫中...';
  fetch(WORKER + '/tools')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      // 只顯示工具名稱清單,避免太長
      if (data && data.result && data.result.tools) {
        var names = data.result.tools.map(function(t) {
          return '• ' + t.name + (t.description ? ' — ' + t.description.slice(0, 50) : '');
        });
        out.textContent = '共 ' + names.length + ' 個工具:\n\n' + names.join('\n');
      } else {
        out.textContent = JSON.stringify(data, null, 2);
      }
    })
    .catch(function(err) { out.textContent = '錯誤: ' + err.message; });
});

document.getElementById('btnRoc').addEventListener('click', function() {
  var y = parseInt(document.getElementById('rocYear').value, 10);
  callTool('twtools-roc-to-ad', { roc_year: y }, 'outRoc');
});

document.getElementById('btnId').addEventListener('click', function() {
  var id = document.getElementById('idNum').value;
  callTool('twtools-id-validate', { id: id }, 'outId');
});

document.getElementById('btnSearch').addEventListener('click', function() {
  var q = document.getElementById('searchQ').value;
  callTool('opendata-search', { query: q }, 'outSearch');
});
</script>

</body>
</html>
